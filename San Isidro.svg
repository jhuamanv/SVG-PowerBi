  </g>
  <text x="360" y="195" fill="#38bdf8" font-family="Arial, sans-serif" font-size="11" font-style="italic">PASILLO FRÍO CONFINADO</text>
  <rect x="530" y="380" width="200" height="50" fill="#0f172a" stroke="#475569" stroke-width="1"/>
